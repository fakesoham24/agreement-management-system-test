<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Payment Management — Month-wise payment summary and tracking">
    <title>Payments — Agreement Management</title>
    <link rel="icon" type="image/webp" href="/static/favicon.webp">
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <div class="app-shell">
        <div class="sidebar-backdrop" id="sidebar-backdrop"></div>

        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <img src="/static/logo.webp" alt="D&amp;V Business Consulting" style="
    width: 169px;
    height: 81px;
">
            </div>
            <nav class="sidebar-nav">
                <div class="nav-section">
                    <div class="nav-section-title">Main</div>
                    <a class="nav-item" href="/dashboard">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
                        Dashboard
                    </a>
                    <a class="nav-item active" href="/payments">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>
                        Payments
                    </a>
                    <a class="nav-item" href="/renewals">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0115.36-6.36L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 01-15.36 6.36L3 16"/></svg>
                        Renewals
                    </a>
                </div>
                <div class="nav-section" id="admin-nav-section" style="display:none">
                    <div class="nav-section-title">Administration</div>
                    <a class="nav-item" href="/admin">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                        Admin Panel
                    </a>
                </div>
            </nav>
            <div class="sidebar-footer">
                <div class="user-info">
                    <div class="user-avatar" id="user-avatar">U</div>
                    <div class="user-details">
                        <div class="user-name" id="user-name">User</div>
                        <div class="user-role" id="user-role">User</div>
                    </div>
                    <button class="btn-ghost btn-icon" onclick="Auth.logout()" title="Logout">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" style="width:18px;height:18px"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                    </button>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="content-header">
                <div style="display:flex;align-items:center;gap:12px">
                    <button class="mobile-toggle" onclick="toggleSidebar()">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:20px;height:20px"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                    </button>
                    <h1>Payments</h1>
                </div>
                <div class="header-actions">
                    <!-- Notifications -->
                    <div class="notification-bell" id="notification-bell" onclick="toggleNotifications()">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" style="width:20px;height:20px"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
                        <div class="notification-count" id="notification-count" style="display:none">0</div>
                        <div class="notification-dropdown" id="notification-dropdown">
                            <div class="notification-dropdown-header">
                                <h4>Notifications</h4>
                                <div class="notification-header-actions">
                                    <button class="btn btn-ghost btn-sm" onclick="markAllRead(event)">Mark all read</button>
                                    <button class="btn-clear-all" onclick="clearAllNotifications(event)" title="Delete all notifications">✕ Clear All</button>
                                </div>
                            </div>
                            <div class="notification-list" id="notification-list"></div>
                        </div>
                    </div>
                </div>
            </header>

            <div class="content-body">
                <!-- Summary Cards -->
                <div class="payments-summary-grid" id="payments-summary"></div>

                <!-- Filters -->
                <div class="payments-filters">
                    <select class="year-selector" id="year-selector" onchange="onYearChange()"></select>
                    <div class="view-toggle" id="view-toggle">
                        <button class="view-toggle-btn active" data-view="month" onclick="switchView('month')">Month</button>
                        <button class="view-toggle-btn" data-view="year" onclick="switchView('year')">Year</button>
                    </div>
                    <div class="payment-status-filter" id="payment-status-filter">
                        <button class="status-filter-btn active" data-status="" onclick="setStatusFilter('')">All</button>
                        <button class="status-filter-btn" data-status="paid" onclick="setStatusFilter('paid')">Paid</button>
                        <button class="status-filter-btn" data-status="pending" onclick="setStatusFilter('pending')">Unpaid</button>
                    </div>
                    <button class="btn btn-sm btn-export" id="export-excel-btn" onclick="exportPaymentsExcel()" title="Export filtered payments to Excel">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" style="width:16px;height:16px"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                        Export Excel
                    </button>
                    <div class="month-tabs" id="month-tabs"></div>
                </div>

                <!-- Payments Table -->
                <div class="payments-table-container" id="payments-table-container">
                    <div style="overflow-x:auto">
                        <table class="payment-table-enhanced">
                            <thead>
                                <tr>
                                    <th>Company</th>
                                    <th>Agreement</th>
                                    <th>Plan</th>
                                    <th>Amount</th>
                                    <th>GST (18%)</th>
                                    <th>TDS (10%)</th>
                                    <th>Net</th>
                                    <th>Due Date</th>
                                    <th>Status</th>
                                    <th>Action</th>
                                </tr>
                            </thead>
                            <tbody id="payments-tbody"></tbody>
                        </table>
                    </div>
                </div>

                <!-- Empty State -->
                <div class="empty-state" id="payments-empty" style="display:none">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="width:48px;height:48px;color:#9ba3b2;margin-bottom:16px">
                        <line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/>
                    </svg>
                    <h3>No payments for this period</h3>
                    <p>There are no payment records for the selected month and year.</p>
                </div>
            </div>
        </main>
    </div>

    <script src="/static/app.js"></script>
    <script>
        if (!Auth.requireAuth()) throw new Error('Not authenticated');

        const user = Auth.getUser();
        let allPayments = [];
        let availableYears = [];
        let selectedYear = new Date().getFullYear();
        let selectedMonth = new Date().getMonth(); // 0-indexed
        let viewMode = 'month'; // 'month' or 'year'
        let statusFilter = ''; // '', 'paid', or 'pending'

        // Parse URL params for deep-linking from dashboard cards
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('month')) {
            selectedMonth = parseInt(urlParams.get('month'));
        }
        if (urlParams.has('year')) {
            selectedYear = parseInt(urlParams.get('year'));
        }

        const MONTH_NAMES = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
        const MONTH_FULL = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];

        function initUI() {
            document.getElementById('user-name').textContent = user.full_name;
            document.getElementById('user-role').textContent = user.role;
            document.getElementById('user-avatar').textContent = user.full_name.charAt(0).toUpperCase();
            if (user.role === 'admin') {
                document.getElementById('admin-nav-section').style.display = 'block';
            }
        }

        // Load all payments
        async function loadPayments() {
            try {
                const data = await api.get('/payments/summary');
                allPayments = data.payments || [];
                availableYears = data.available_years || [selectedYear];

                renderYearSelector();
                renderMonthTabs();
                renderPayments();
            } catch (err) {
                showToast(err.message, 'error');
            }
        }

        // Year selector
        function renderYearSelector() {
            const select = document.getElementById('year-selector');
            select.innerHTML = availableYears.map(y =>
                `<option value="${y}" ${y === selectedYear ? 'selected' : ''}>${y}</option>`
            ).join('');
        }

        function onYearChange() {
            selectedYear = parseInt(document.getElementById('year-selector').value);
            renderMonthTabs();
            renderPayments();
        }

        // Month tabs
        function renderMonthTabs() {
            const tabs = document.getElementById('month-tabs');

            // Determine which months have payments for the selected year
            const monthsWithPayments = new Set();
            allPayments.forEach(p => {
                if (p.due_date) {
                    try {
                        const d = new Date(p.due_date);
                        if (d.getFullYear() === selectedYear) {
                            monthsWithPayments.add(d.getMonth());
                        }
                    } catch(e) {}
                }
            });

            tabs.innerHTML = MONTH_NAMES.map((name, idx) => {
                const isActive = idx === selectedMonth ? 'active' : '';
                const hasPayments = monthsWithPayments.has(idx) ? 'has-payments' : '';
                return `<button class="month-tab ${isActive} ${hasPayments}" data-month="${idx}" onclick="selectMonth(${idx})">${name}</button>`;
            }).join('');
        }

        function selectMonth(month) {
            selectedMonth = month;
            document.querySelectorAll('.month-tab').forEach(t => t.classList.remove('active'));
            document.querySelector(`[data-month="${month}"]`).classList.add('active');
            renderPayments();
        }

        // View toggle (month/year)
        function switchView(mode) {
            viewMode = mode;
            document.querySelectorAll('.view-toggle-btn').forEach(b => b.classList.remove('active'));
            document.querySelector(`[data-view="${mode}"]`).classList.add('active');

            const monthTabs = document.getElementById('month-tabs');
            if (mode === 'year') {
                monthTabs.style.display = 'none';
            } else {
                monthTabs.style.display = 'flex';
            }
            renderPayments();
        }

        // Filter payments for selected year + month (or full year)
        function getFilteredPayments() {
            return allPayments.filter(p => {
                if (!p.due_date) return false;
                try {
                    const d = new Date(p.due_date);
                    if (d.getFullYear() !== selectedYear) return false;
                    if (viewMode === 'month' && d.getMonth() !== selectedMonth) return false;
                    // Status filter
                    if (statusFilter === 'paid' && p.status !== 'paid') return false;
                    if (statusFilter === 'pending' && p.status === 'paid') return false;
                    return true;
                } catch(e) { return false; }
            });
        }

        // Status filter
        function setStatusFilter(status) {
            statusFilter = status;
            document.querySelectorAll('.status-filter-btn').forEach(b => b.classList.remove('active'));
            document.querySelector(`.status-filter-btn[data-status="${status}"]`).classList.add('active');
            renderPayments();
        }

        // Render summary cards
        function renderSummary(filtered) {
            const monthTotal = filtered.reduce((sum, p) => sum + (p.amount || 0), 0);
            const monthPaid = filtered.filter(p => p.status === 'paid').reduce((sum, p) => sum + (p.amount || 0), 0);
            const monthPending = filtered.filter(p => p.status !== 'paid').reduce((sum, p) => sum + (p.amount || 0), 0);

            // Year total (all months)
            const yearPayments = allPayments.filter(p => {
                if (!p.due_date) return false;
                try { return new Date(p.due_date).getFullYear() === selectedYear; } catch(e) { return false; }
            });
            const yearTotal = yearPayments.reduce((sum, p) => sum + (p.amount || 0), 0);

            // Determine most common currency
            const currency = (filtered.length > 0 && filtered[0].currency) || '₹';

            const periodLabel = viewMode === 'year' ? `${selectedYear}` : MONTH_FULL[selectedMonth];

            document.getElementById('payments-summary').innerHTML = `
                <div class="payments-stat-card">
                    <div class="stat-icon blue">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>
                    </div>
                    <div class="payments-stat-label">${periodLabel} Total</div>
                    <div class="payments-stat-value">${formatCurrency(monthTotal, currency)}</div>
                </div>
                <div class="payments-stat-card">
                    <div class="stat-icon green">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><polyline points="20 6 9 17 4 12"/></svg>
                    </div>
                    <div class="payments-stat-label">${periodLabel} Paid</div>
                    <div class="payments-stat-value">${formatCurrency(monthPaid, currency)}</div>
                </div>
                <div class="payments-stat-card">
                    <div class="stat-icon amber">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
                    </div>
                    <div class="payments-stat-label">${periodLabel} Pending</div>
                    <div class="payments-stat-value">${formatCurrency(monthPending, currency)}</div>
                </div>
                <div class="payments-stat-card">
                    <div class="stat-icon purple">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                    </div>
                    <div class="payments-stat-label">${selectedYear} Year Total</div>
                    <div class="payments-stat-value">${formatCurrency(yearTotal, currency)}</div>
                </div>
            `;
        }

        // Render payments table
        function renderPayments() {
            const filtered = getFilteredPayments();
            renderSummary(filtered);

            const tbody = document.getElementById('payments-tbody');
            const container = document.getElementById('payments-table-container');
            const empty = document.getElementById('payments-empty');

            if (filtered.length === 0) {
                container.style.display = 'none';
                empty.style.display = 'block';
                return;
            }

            container.style.display = 'block';
            empty.style.display = 'none';

            // HR user: global payment access but not admin — disable company name navigation
            const isHrUser = user.global_payment_access && user.role !== 'admin';

            let totalAmount = 0, totalGst = 0, totalTds = 0, totalNet = 0;

            const rows = filtered.map(p => {
                const amount = p.amount || 0;
                const gst = p.gst || 0;
                const tds = p.tds || 0;
                const net = p.net || amount;
                totalAmount += amount;
                totalGst += gst;
                totalTds += tds;
                totalNet += net;

                const currency = p.currency || '₹';
                const isPaid = p.status === 'paid';

                const statusHtml = isPaid
                    ? `<span class="badge badge-paid">Paid</span>`
                    : `<span class="badge badge-pending">Pending</span>`;

                const actionHtml = isPaid
                    ? `<span style="color:var(--color-text-muted);font-size:0.78rem">—</span>`
                    : `<button class="btn-mark-paid" onclick="markPaymentPaid(${p.payment_id}, event)">Mark Paid</button>`;

                // Company name cell: clickable for admin/regular users, plain text for HR users
                const companyTd = isHrUser
                    ? `<td class="plan-name" style="cursor:default;color:var(--color-text-primary)">${p.company_name}</td>`
                    : `<td class="plan-name" onclick="window.location.href='/agreement/${p.agreement_id}'" style="cursor:pointer">${p.company_name}</td>`;

                return `
                    <tr>
                        ${companyTd}
                        <td>AG-${String(p.agreement_id).padStart(4, '0')}</td>
                        <td>${p.plan_name || '—'}</td>
                        <td>${formatCurrency(amount, currency)}</td>
                        <td>${formatCurrency(gst, currency)}</td>
                        <td>${formatCurrency(tds, currency)}</td>
                        <td><strong>${formatCurrency(net, currency)}</strong></td>
                        <td>${formatDate(p.due_date)}</td>
                        <td>${statusHtml}</td>
                        <td>${actionHtml}</td>
                    </tr>
                `;
            }).join('');

            const currency = (filtered.length > 0 && filtered[0].currency) || '₹';
            const totalRow = `
                <tr class="total-row">
                    <td class="plan-name" colspan="3">Total — ${viewMode === 'year' ? selectedYear : MONTH_FULL[selectedMonth] + ' ' + selectedYear}</td>
                    <td>${formatCurrency(totalAmount, currency)}</td>
                    <td>${formatCurrency(totalGst, currency)}</td>
                    <td>${formatCurrency(totalTds, currency)}</td>
                    <td>${formatCurrency(totalNet, currency)}</td>
                    <td>—</td>
                    <td>—</td>
                    <td>—</td>
                </tr>
            `;

            tbody.innerHTML = rows + totalRow;
        }

        // Mark payment as paid
        async function markPaymentPaid(paymentId, e) {
            e.stopPropagation();
            try {
                await api.put(`/payments/${paymentId}/mark-paid`);
                showToast('Payment marked as paid', 'success');
                loadPayments();
                loadNotifications();
            } catch (err) {
                showToast(err.message, 'error');
            }
        }

        // Notifications (same as dashboard)
        async function loadNotifications() {
            try {
                const data = await api.get('/notifications/');
                const notifications = data.notifications || [];
                const unread = notifications.filter(n => !n.is_read);
                const countEl = document.getElementById('notification-count');

                if (unread.length > 0) {
                    countEl.textContent = unread.length;
                    countEl.style.display = 'flex';
                } else {
                    countEl.style.display = 'none';
                }

                const list = document.getElementById('notification-list');
                if (notifications.length === 0) {
                    list.innerHTML = '<div style="padding:24px;text-align:center;color:var(--color-text-muted);font-size:0.85rem">No notifications</div>';
                } else {
                    list.innerHTML = notifications.map(n => {
                        const clickable = n.agreement_id ? 'clickable' : '';
                        const clickAction = n.agreement_id
                            ? (n.title && n.title.includes('Payment') ? `window.location.href='/payments'` : `window.location.href='/agreement/${n.agreement_id}'`)
                            : '';
                        return `
                        <div class="notification-item ${n.is_read ? '' : 'unread'} ${clickable}" onclick="${clickAction ? clickAction : `markNotificationRead(${n.id})`}">
                            <div class="notification-title">${n.title}</div>
                            <div class="notification-message">${n.message}</div>
                            <div class="notification-time">${formatDate(n.created_at)}</div>
                            <button class="notification-delete" onclick="deleteNotification(${n.id}, event)" title="Delete notification">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:12px;height:12px"><path d="M18 6L6 18M6 6l12 12"/></svg>
                            </button>
                        </div>
                    `;
                    }).join('');
                }
            } catch (err) { /* silent */ }
        }

        function toggleNotifications() {
            document.getElementById('notification-dropdown').classList.toggle('open');
        }

        async function markNotificationRead(id) {
            try {
                await api.put(`/notifications/${id}/read`);
                loadNotifications();
            } catch (err) { /* silent */ }
        }

        async function markAllRead(e) {
            e.stopPropagation();
            try {
                await api.put('/notifications/read-all');
                loadNotifications();
            } catch (err) { /* silent */ }
        }

        async function deleteNotification(id, e) {
            e.stopPropagation();
            try {
                await api.delete(`/notifications/${id}`);
                loadNotifications();
            } catch (err) { /* silent */ }
        }

        async function clearAllNotifications(e) {
            e.stopPropagation();
            try {
                await api.delete('/notifications/');
                loadNotifications();
            } catch (err) { /* silent */ }
        }

        // Close notification dropdown on outside click
        document.addEventListener('click', (e) => {
            const bell = document.getElementById('notification-bell');
            if (!bell.contains(e.target)) {
                document.getElementById('notification-dropdown').classList.remove('open');
            }
        });

        // Export payments to Excel
        function exportPaymentsExcel() {
            let url = `/api/export/payments?year=${selectedYear}`;
            if (viewMode === 'month') {
                url += `&month=${selectedMonth}`;
            }
            if (statusFilter) {
                url += `&status=${statusFilter}`;
            }

            // Trigger download via a temporary link with auth token
            const token = Auth.getToken();
            fetch(url, {
                headers: { 'Authorization': `Bearer ${token}` }
            })
            .then(response => {
                if (!response.ok) throw new Error('Export failed');
                return response.blob();
            })
            .then(blob => {
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                const period = viewMode === 'month' ? `${MONTH_FULL[selectedMonth]}_${selectedYear}` : `${selectedYear}`;
                a.download = `Payments_${period}.xlsx`;
                document.body.appendChild(a);
                a.click();
                a.remove();
                URL.revokeObjectURL(a.href);
                showToast('Payments exported successfully', 'success');
            })
            .catch(err => showToast(err.message, 'error'));
        }

        // Mobile sidebar
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('sidebar-backdrop').classList.toggle('open');
        }
        document.getElementById('sidebar-backdrop').addEventListener('click', toggleSidebar);

        // Init
        initUI();
        loadPayments();
        loadNotifications();
    </script>
</body>
</html>
